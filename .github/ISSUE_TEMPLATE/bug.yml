name: Bug report
description: Report a SummonerWorld bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List clear reproduction steps.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Player
        - Creature
        - Combat
        - Dungeon
        - World
        - NPC
        - Economy
        - Save/load
        - UI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant logs, screenshots, or notes.
    validations:
      required: false
